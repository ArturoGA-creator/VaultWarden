services:
    vaultwarden:
        image: vaultwarden/server:latest
        restart: unless-stopped
        expose:
            - "80"
        environment:
            DOMAIN: "https://localhost"
        volumes:
            - ./data:/data
    caddy:
        image: caddy:latest
        restart: unless-stopped
        ports:
            - "443:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile